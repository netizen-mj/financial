<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance App Local Preview</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #0a0e17;
      }

      #root {
        min-height: 100vh;
      }

      .boot-message {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        color: #f1f5f9;
        font: 500 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-card {
        max-width: 560px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 20px 22px;
        background: rgba(17, 24, 39, 0.92);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      }

      .boot-card h1 {
        margin: 0 0 10px;
        font-size: 1.2rem;
      }

      .boot-card p {
        margin: 0;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-message">
        <div class="boot-card">
          <h1>Loading local preview...</h1>
          <p>This page is compiling your downloaded React JSX file directly in the browser.</p>
        </div>
      </div>
    </div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      async function boot() {
        const rootEl = document.getElementById("root");

        try {
          const response = await fetch("/Downloads/finance-app.jsx");
          if (!response.ok) {
            throw new Error("Could not read /Downloads/finance-app.jsx");
          }

          const source = await response.text();
          const normalizedSource = source
            .replace(/^import\s+\{[^}]+\}\s+from\s+"react";\s*/m, "const { useState, useEffect, useRef } = React;\n")
            .replace(/export\s+default\s+function\s+FinanceApp\s*\(/, "function FinanceApp(")
            .concat("\n\nconst root = ReactDOM.createRoot(document.getElementById('root'));\nroot.render(React.createElement(FinanceApp));\n");

          const compiled = Babel.transform(normalizedSource, {
            presets: ["react"]
          }).code;

          const script = document.createElement("script");
          script.textContent = compiled;
          document.body.appendChild(script);
        } catch (error) {
          rootEl.innerHTML = `
            <div class="boot-message">
              <div class="boot-card">
                <h1>Preview failed to load</h1>
                <p>${String(error.message || error)}</p>
              </div>
            </div>
          `;
          console.error(error);
        }
      }

      boot();
    </script>
  </body>
</html>
